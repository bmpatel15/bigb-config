# ============================================================
#  hypridle — idle management for Hyprland
#  Progression:  2.5m dim → 5m lock → 5.5m screen off → 30m suspend
#  Also locks before ANY sleep (lid close, low battery, power menu).
# ============================================================

general {
    # Bring up the locker. `pidof` guard prevents a second hyprlock stacking
    # if one is already up. lock.sh stages the blurred wallpaper, then execs
    # hyprlock (same locker used by Alt+L and the waybar power menu).
    lock_cmd = pidof hyprlock || $HOME/.config/hypr/scripts/lock.sh

    # Lock the moment a sleep is requested — this is what makes LID CLOSE
    # lock: logind suspends on lid close, hypridle catches it and locks first.
    before_sleep_cmd = loginctl lock-session

    # Wake the display back up on resume (undo the dpms-off listener below).
    after_sleep_cmd = hyprctl dispatch dpms on

    # Respect apps that inhibit idle (video players, etc.) so it won't dim or
    # lock mid-movie.
    ignore_dbus_inhibit = false
}

# --- 2.5 min: dim the backlight as a soft "you're idle" warning -----------
# brightnessctl -s saves the current level; -r restores it instantly on the
# first key/mouse activity.
listener {
    timeout    = 150
    on-timeout = brightnessctl -s set 10%
    on-resume  = brightnessctl -r
}

# --- 5 min: lock the session ----------------------------------------------
# Fires lock_cmd (via the logind Lock signal). dpms-off and suspend below
# then happen behind the lock.
listener {
    timeout    = 300
    on-timeout = loginctl lock-session
}

# --- 5.5 min: turn the display off ----------------------------------------
listener {
    timeout    = 330
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

# --- 30 min: suspend ------------------------------------------------------
# before_sleep_cmd above guarantees we're already locked when this fires.
listener {
    timeout    = 1800
    on-timeout = systemctl suspend
}
