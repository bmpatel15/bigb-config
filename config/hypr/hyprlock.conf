# ============================================================
#  hyprlock — centered frosted card
#  Omarchy Ethereal · lavender + peach accent (matches waybar/ghostty/rofi)
#  Background = blurred copy of the current wallpaper (staged by scripts/lock.sh)
# ============================================================

$font = JetBrainsMono Nerd Font

general {
    hide_cursor        = true
    grace              = 0
    ignore_empty_input = true
    text_trim          = true
}

# --- background: frosted, dimmed copy of the live wallpaper ---------------
background {
    monitor           =
    path              = $HOME/.cache/hyprlock-bg.png
    blur_passes       = 3
    blur_size         = 6
    noise             = 0.0117
    contrast          = 0.9000
    brightness        = 0.6500
    vibrancy          = 0.1700
    vibrancy_darkness = 0.0
}

# --- the card -------------------------------------------------------------
shape {
    monitor      =
    size         = 460, 500
    color        = rgba(060b1e99)
    rounding     = 24
    border_size  = 2
    border_color = rgba(7d82d959)
    position     = 0, -10
    halign       = center
    valign       = center
}

# --- avatar (circular, overlapping the card's top edge) -------------------
image {
    monitor      =
    path         = $HOME/.config/hypr/assets/avatar.png
    size         = 120
    rounding     = -1
    border_size  = 3
    border_color = rgba(7d82d9ff)
    position     = 0, 200
    halign       = center
    valign       = center
}

# --- display name ---------------------------------------------------------
label {
    monitor     =
    text        = BigB
    color       = rgba(dfeaf0ff)
    font_size   = 18
    font_family = $font Medium
    position    = 0, 118
    halign      = center
    valign      = center
}

# --- time -----------------------------------------------------------------
label {
    monitor     =
    text        = $TIME
    color       = rgba(ffceadff)
    font_size   = 58
    font_family = $font ExtraBold
    position    = 0, 30
    halign      = center
    valign      = center
}

# --- date -----------------------------------------------------------------
label {
    monitor     =
    text        = cmd[update:60000] date +"%A, %B %d"
    color       = rgba(a3bfd1ff)
    font_size   = 15
    font_family = $font Medium
    position    = 0, -40
    halign      = center
    valign      = center
}

# --- username pill (decorative) ------------------------------------------
shape {
    monitor     =
    size        = 360, 46
    color       = rgba(3c486d80)
    rounding    = 14
    border_size = 0
    position    = 0, -120
    halign      = center
    valign      = center
}

label {
    monitor     =
    text        =   $USER
    color       = rgba(dfeaf0ff)
    font_size   = 14
    font_family = $font Medium
    position    = 0, -120
    halign      = center
    valign      = center
}

# --- password input -------------------------------------------------------
input-field {
    monitor           =
    size              = 360, 46
    outline_thickness = 0
    dots_size         = 0.28
    dots_spacing      = 0.30
    dots_center       = true
    rounding          = 14
    inner_color       = rgba(3c486d80)
    font_color        = rgba(dfeaf0ff)
    fade_on_empty     = false
    placeholder_text  =   Enter Password
    check_color       = rgba(92a593ff)
    fail_color        = rgba(ed5b5aff)
    fail_text         = <i>$FAIL ($ATTEMPTS)</i>
    position          = 0, -185
    halign            = center
    valign            = center
}
