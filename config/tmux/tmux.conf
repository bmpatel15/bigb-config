# ~/.config/tmux/tmux.conf — Omarchy Ethereal
# https://github.com/basecamp/omarchy/tree/master/themes/ethereal
# Palette: bg #060B1E  fg/peach #ffcead  lavender #7d82d9  muted #6d7db6
#          steel #3C486D  red #ED5B5A  green #92a593  yellow #E9BB4F
#          orange #F99957  pink #c89dc1  cyan #a3bfd1
# Companion guide: BigB-PKM/08 - Attachments/Tmux Workflow.md

# ── Core ────────────────────────────────────────────────────────────────
# Prefix: Ctrl-a (double-tap sends a literal Ctrl-a to the shell).
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Truecolor. tmux-256color + RGB so nvim/ethereal render without banding.
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"

set -g mouse on
set -sg escape-time 0          # no delay after Esc (snappy in nvim)
set -g history-limit 100000
set -g focus-events on         # let nvim autoread/autosave on focus
set -g display-time 1500       # messages linger a touch longer
set -g status-interval 5       # refresh the clock every 5s

# 1-based, self-renumbering windows & panes.
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Don't drop me to a bare terminal when a session's last window dies —
# hop to another live session instead.
set -g detach-on-destroy off

# ── Keybinds (prefix = Ctrl-a) ──────────────────────────────────────────
# Reload this file.
bind r source-file ~/.config/tmux/tmux.conf \; display "  tmux.conf reloaded"

# Splits inherit the current pane's directory. | vertical, - horizontal.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
# New window also inherits cwd.
bind c new-window -c "#{pane_current_path}"

# Repeatable pane resize (hold prefix, tap H/J/K/L).
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Prefix-based pane nav (fallback; seamless Ctrl-h/j/k/l comes from
# vim-tmux-navigator below and needs no prefix).
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Repeatable window nav.
bind -r n next-window
bind -r p previous-window
bind Tab last-window

# Zoom a pane fullscreen / back.
bind m resize-pane -Z

# Popups: g = lazygit, Enter = scratch shell (both float, close on exit).
bind g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "lazygit"
bind Enter display-popup -E -w 80% -h 75% -d "#{pane_current_path}"

# ── Copy mode (vi) ──────────────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel   # tmux-yank -> Wayland clipboard
bind -T copy-mode-vi Escape send -X cancel
bind [ copy-mode
bind ] paste-buffer

# ── Ethereal status bar ─────────────────────────────────────────────────
set -g status on
set -g status-position bottom          # waybar owns the top
set -g status-justify left
set -g status-style "bg=#060B1E,fg=#ffcead"
set -g status-left-length 40
set -g status-right-length 80

# Session name in a lavender block, powerline cap.
set -g status-left "#[fg=#060B1E,bg=#7d82d9,bold]  #S #[fg=#7d82d9,bg=#060B1E,nobold] "

# Windows: active = peach block, inactive = muted text. #F shows the zoom flag.
set -g window-status-separator ""
set -g window-status-format "#[fg=#6d7db6,bg=#060B1E] #I #W#{?window_flags,#F, } "
set -g window-status-current-format "#[fg=#060B1E,bg=#ffcead,bold] #I  #W#{?window_zoomed_flag,  ,} #[fg=#ffcead,bg=#060B1E,nobold]"

# Right: clock on steel, date on lavender.
set -g status-right "#[fg=#3C486D,bg=#060B1E]#[fg=#ffcead,bg=#3C486D]  %H:%M #[fg=#7d82d9,bg=#3C486D]#[fg=#060B1E,bg=#7d82d9,bold]  %a %d %b #[default]"

# Borders, messages, copy-selection, clock.
set -g pane-border-style "fg=#3C486D"
set -g pane-active-border-style "fg=#7d82d9"
set -g message-style "bg=#7d82d9,fg=#060B1E,bold"
set -g message-command-style "bg=#3C486D,fg=#ffcead"
set -g mode-style "bg=#7d82d9,fg=#060B1E"
setw -g clock-mode-colour "#7d82d9"
setw -g window-status-activity-style "fg=#E9BB4F,bg=#060B1E"
set -g pane-border-lines heavy

# ── Plugins (TPM) ───────────────────────────────────────────────────────
# First run: git clone https://github.com/tmux-plugins/tpm \
#              ~/.config/tmux/plugins/tpm   then press  prefix + I
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Session persistence: capture pane contents, restore nvim sessions,
# auto-save every 15 min, auto-restore on tmux start.
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Keep this LAST.
run '~/.config/tmux/plugins/tpm/tpm'
