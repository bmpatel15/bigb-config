# Read automatically by the Arch /usr/bin/chromium launcher.
# Native Wayland when available (falls back to X11 otherwise).
--ozone-platform-hint=auto
# Dark browser UI (settings/history/dialogs) + advertise prefers-color-scheme:dark
# so sites with a native dark variant use it. Does NOT force-invert light-only
# pages. Delete this line to get light web content back.
--force-dark-mode
